<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{{ form_title }}</title>
  {% load static %}
  <link href="https://unpkg.com/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
<div class="flex min-h-screen">

  <!-- Sidebar Included -->
  {% include "includes/sidebar.html" %}

  <!-- Main Content Area -->
  <main class="flex-1 p-4 md:p-6 flex items-center justify-center">
    <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-lg">

      <!-- Form Header -->
      <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">{{ form_title }}</h1>

      <!-- Form -->
      <form method="post" class="space-y-6">
        {% csrf_token %}
        
        <!-- Name Field -->
        <div>
          <label for="{{ form.name.id_for_label }}" class="block text-sm font-medium text-gray-700">Full Name</label>
          {{ form.name }}
          {% if form.name.errors %}
            <p class="mt-1 text-sm text-red-600">{{ form.name.errors.0 }}</p>
          {% endif %}
        </div>
        
        <!-- Email Field -->
        <div>
          <label for="{{ form.email.id_for_label }}" class="block text-sm font-medium text-gray-700">Email Address</label>
          {{ form.email }}
          {% if form.email.errors %}
            <p class="mt-1 text-sm text-red-600">{{ form.email.errors.0 }}</p>
          {% endif %}
        </div>
        
        <!-- Action Buttons -->
        <div class="flex items-center justify-end space-x-4 pt-4">
          <a href="{% url 'ocrtesting:manage_recipients' %}" class="bg-gray-200 text-gray-800 font-semibold py-2 px-4 rounded-md hover:bg-gray-300 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-500">
            Cancel
          </a>
          <button type="submit" class="bg-blue-600 text-white font-semibold py-2 px-4 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
            {{ button_text }}
          </button>
        </div>
      </form>

    </div>
  </main>
</div>
</body>
</html>
