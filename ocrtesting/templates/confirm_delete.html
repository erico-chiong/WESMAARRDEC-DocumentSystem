<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Confirm Delete</title>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body style="background-color: #f3f4f6; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif;">
  <form id="delete-form" method="post">
    {% csrf_token %}
  </form>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
        Swal.fire({
            title: 'Delete Confirmation',
            text: 'Are you sure you want to delete "{{ object }}"? This action cannot be undone.',
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#d33',
            cancelButtonColor: '#3085d6',
            confirmButtonText: 'Yes, Delete it!',
            cancelButtonText: 'Cancel',
            allowOutsideClick: false
        }).then((result) => {
            if (result.isConfirmed) {
                document.getElementById('delete-form').submit();
            } else {
                history.back();
            }
        });
    });
  </script>
</body>
</html>
