{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset | WESMAARRDEC</title>

    <!-- Link to the shared authentication stylesheet -->
    <link rel="stylesheet" href="{% static 'accounts/css/login.css' %}">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

    <main class="login-container">

        <!-- Left Side: Branding and Welcome Message -->
        <section class="login-branding">
            <img src="{% static '/images/logo.png' %}" alt="WESMAARRDEC Logo" class="logo">
            <h1></h1>
            <p></p>
        </section>

        <!-- Right Side: The Password Reset Form -->
        <section class="login-form-wrapper">
            <h2>Password Reset</h2>
            <p class="subtitle">Enter your email to receive a verification code.</p>

            <form method="post" action="{% url 'accounts:password_reset_request' %}">
                {% csrf_token %}

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" name="email" id="email" class="form-control" placeholder="Enter your email" required>
                </div>

                <button type="submit" class="btn-login">Send Code</button>

                <div class="signup-link">
                    Remember your password? <a href="{% url 'accounts:login' %}">Sign In</a>
                </div>
            </form>
        </section>

    </main>

    <!-- Adding custom attributes to form fields -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            document.querySelectorAll('form input').forEach(field => {
                if (field.type !== 'submit' && field.type !== 'hidden' && field.type !== 'checkbox') {
                    field.classList.add('form-control');
                }
            });

            {% if messages %}
                {% for message in messages %}
                    Swal.fire({
                        icon: "{{ message.tags }}" === "error" ? "error" : "{{ message.tags }}" === "success" ? "success" : "info",
                        title: "{{ message.tags|capfirst }}",
                        text: "{{ message }}",
                        timer: 4000,
                        showConfirmButton: false
                    });
                {% endfor %}
            {% endif %}
        });
    </script>
</body>
</html>
