{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Reset Code | WESMAARRDEC</title>
    <link rel="stylesheet" href="{% static 'accounts/css/login.css' %}">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <main class="login-container">
        <section class="login-branding">
            <img src="{% static '/images/logo.png' %}" alt="WESMAARRDEC Logo" class="logo">
        </section>
        <section class="login-form-wrapper">
            <h2>Verify Reset Code</h2>
            <p class="subtitle">Please enter the 6-digit code sent to <strong>{{ email }}</strong></p>

            <form method="post">
                {% csrf_token %}

                <div class="form-group">
                    <label for="code">Verification Code</label>
                    <input type="text" name="code" id="code" class="form-control" placeholder="Enter 6-digit code" required>
                </div>

                <button type="submit" class="btn-login">Verify Code</button>
            </form>
        </section>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            {% if messages %}
                {% for message in messages %}
                    Swal.fire({
                        icon: "{{ message.tags }}" === "error" ? "error" : "{{ message.tags }}" === "success" ? "success" : "info",
                        title: "{{ message.tags|capfirst }}",
                        text: "{{ message }}",
                        timer: 4000,
                        showConfirmButton: false
                    });
                {% endfor %}
            {% endif %}
        });
    </script>
</body>
</html>
